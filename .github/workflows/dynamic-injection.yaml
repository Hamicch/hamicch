name: Dynamic README injection
# Schedule disabled: this job overwrote README.md from README.template.md and conflicted with the profile README + stats workflow.
on:
    workflow_dispatch:
jobs:
    get-office-quotes:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2

            - name: Let the magic happen
              uses: actions/setup-node@v1
              with:
                  node-version: 14.6.0

            - run: yarn

            - run: node .

            - name: Add to git repo
              run: |
                  git config pull.rebase false
                  git pull
                  git add .
                  git config --global user.name "Your Name"
                  git config --global user.email "Your E-Mail"
                  git commit -m "[Automated] README updated with new Office quote!"
            - name: Push
              uses: ad-m/github-push-action@master
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}

    update-readme-with-blog:
        needs: get-office-quotes
        name: Update this repo's README with latest blog posts
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - uses: gautamkrishnar/blog-post-workflow@master
              with:
                  # Replace this URL with your rss feed URL/s
                  # feed_list: 'https://hayatusanusi.io/rss.xml'
